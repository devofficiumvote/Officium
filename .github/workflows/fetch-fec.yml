name: Fetch FEC Data

on:
  schedule:
    - cron: '0 7 * * 3'  # Wednesdays at 7am UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-fec:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node scripts/fetch-fec.mjs
      - name: Check for changes
        id: changes
        run: git diff --quiet public/data/fec-candidates.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT
      - name: Commit
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/fec-candidates.json
          git commit -m "chore: update FEC data $(date -u +%Y-%m-%d)"
          git push
